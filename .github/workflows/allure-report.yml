name: CI Self-Healing Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ── Stage 1: Install Dependencies ────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🌐 Install Google Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: 📦 Download Maven Dependencies
        run: mvn dependency:resolve -q

      - name: 💾 Cache Maven Packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

  # ── Stage 2: Lint and Validate ───────────────────────────────────
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Validate POM Structure
        run: mvn validate -q

      - name: 🧹 Compile Source Code
        run: mvn compile test-compile -q

      - name: ✅ Check Code Compiles Clean
        run: echo "All Java sources compiled successfully — no syntax errors."

  # ── Stage 3: Retail Role Flows ───────────────────────────────────
  retail-role-flows:
    name: Retail Role Flows
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🌐 Install Google Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: 🧪 Run Self-Healing Test Suite
        run: mvn clean test -Dtest=RetailWebsiteTest
        continue-on-error: true

      - name: 📊 Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.32.0
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" -O /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /opt/
          sudo ln -sf /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: 📊 Restore Allure History
        if: always()
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git checkout origin/gh-pages -- history 2>/dev/null || true
            if [ -d history ]; then
              cp -r history target/allure-results/history
              echo "✅ History restored from gh-pages"
            fi
          fi

      - name: 📊 Generate Allure Report
        if: always()
        run: allure generate target/allure-results --clean -o allure-history

      - name: 🚀 Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: 💾 Upload Allure Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 7

  # ── Stage 4: Healing Report Summary ─────────────────────────────
  healing-report-summary:
    name: Healing Report Summary
    runs-on: ubuntu-latest
    needs: retail-role-flows
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Allure Results Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: 🗂️ Parse Results & Build Run JSON
        id: parse
        run: |
          RUN_ID="${{ github.run_id }}"
          RUN_NUMBER="${{ github.run_number }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          WORKFLOW="${{ github.workflow }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          TOTAL=0; PASSED=0; FAILED=0; BROKEN=0; SKIPPED=0
          for f in target/allure-results/*.json; do
            [ -f "$f" ] || continue
            STATUS=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
            case "$STATUS" in
              passed)  PASSED=$((PASSED+1))  ;;
              failed)  FAILED=$((FAILED+1))  ;;
              broken)  BROKEN=$((BROKEN+1))  ;;
              skipped) SKIPPED=$((SKIPPED+1)) ;;
            esac
            TOTAL=$((TOTAL+1))
          done

          SELECTOR_HEALS=0
          for f in target/allure-results/*-attachment.txt; do
            [ -f "$f" ] || continue
            if grep -qi "healed" "$f"; then
              SELECTOR_HEALS=$((SELECTOR_HEALS+1))
            fi
          done

          # Calculate metrics matching friend's format
          # Estimated time saved: 0.5 mins per heal (based on 11 heals = 5.5 in example)
          EST_SAVED=$(python3 -c "print($SELECTOR_HEALS * 0.5)")
          
          # Heal Success Rate: (heals / (heals + failures)) * 100 (based on 11 heals, 11 failures = 50% in example)
          DENOM=$((SELECTOR_HEALS + FAILED))
          if [ "$DENOM" -gt 0 ]; then
            HEAL_RATE=$(python3 -c "print(round(($SELECTOR_HEALS / $DENOM) * 100, 1))")
          else
            HEAL_RATE="100.0"
          fi

          cat > /tmp/run.json <<EOF
          {
            "runId": "${RUN_ID}",
            "runNumber": "${RUN_NUMBER}",
            "workflowName": "${WORKFLOW}",
            "repository": "${REPO}",
            "branch": "${BRANCH}",
            "commitSha": "${SHA}",
            "event": "${EVENT}",
            "generatedAt": "${TIMESTAMP}",
            "totalRuns": ${TOTAL},
            "totalTestsCompleted": ${TOTAL},
            "totalSelectorHeals": ${SELECTOR_HEALS},
            "totalFlowHeals": 0,
            "totalFailures": ${FAILED},
            "estimatedTimeSaved": "${EST_SAVED}",
            "healSuccessRate": "${HEAL_RATE}",
            "file": "runs/${RUN_ID}.json"
          }
          EOF

          python3 -m json.tool /tmp/run.json > /dev/null && echo "✅ run.json is valid"

          TIME_SAVED_HOURS=$(python3 -c "print(round(${SELECTOR_HEALS} * 0.5 / 60, 4))")
          if [ "$DENOM" -gt 0 ]; then
            HEAL_RATE_FRACTION=$(python3 -c "print(round(${SELECTOR_HEALS} / ${DENOM}, 4))")
          else
            HEAL_RATE_FRACTION="0.0"
          fi

          cat > ci-summary.json <<EOF
          {
            "totalRuns": ${TOTAL},
            "selectorHeals": ${SELECTOR_HEALS},
            "flowHeals": 0,
            "failures": ${FAILED},
            "timeSavedHours": ${TIME_SAVED_HOURS},
            "healRate": ${HEAL_RATE_FRACTION}
          }
          EOF

          python3 -m json.tool ci-summary.json > /dev/null && echo "✅ ci-summary.json is valid"

          echo "RUN_ID=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: 💾 Push Run Data to dashboard-data Branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.run_id }}"
          TIMESTAMP="${{ steps.parse.outputs.TIMESTAMP }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin dashboard-data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin dashboard-data; then
            git checkout dashboard-data
          else
            git checkout --orphan dashboard-data
            git rm -rf . 2>/dev/null || true
            mkdir -p runs
            echo '[]' > history.json
            git add history.json
            git commit -m "chore: init dashboard-data branch"
            git push origin dashboard-data
          fi

          mkdir -p runs
          cp /tmp/run.json runs/${RUN_ID}.json
          cp /tmp/run.json latest.json

          python3 - <<'PYEOF'
          import json, os
          with open('/tmp/run.json') as f:
              new_run = json.load(f)
          
          history_path = "history.json"
          if os.path.exists(history_path):
              with open(history_path) as f:
                  try:
                      history = json.load(f)
                      if not isinstance(history, list):
                          history = []
                  except:
                      history = []
          else:
              history = []
          
          history.insert(0, new_run)
          history = history[:50]
          
          with open(history_path, "w") as f:
              json.dump(history, f, indent=2)
          print(f"✅ history.json updated — {len(history)} run(s) stored")
          PYEOF

          git add runs/${RUN_ID}.json latest.json history.json
          git commit -m "data: run #${{ github.run_number }} @ ${TIMESTAMP}"
          git push origin dashboard-data
          echo "✅ Dashboard data pushed to dashboard-data branch"

      - name: Upload CI Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: ci-summary.json
